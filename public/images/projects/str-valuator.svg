<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" role="img" aria-label="Vacation rental valuator: a back-to-back population-pyramid of SHAP feature contributions. The rental (house, orange, left) and its market (cluster of homes, slate, right) sit at the top and are weighed against each other across a central &#39;vs&#39; axis to reach an appraised value.">

  
  <g stroke-linejoin="round" stroke-linecap="round">
    <polygon points="133,35 150,21 167,35" fill="#fe6e00" fill-opacity="0.14" stroke="#fe6e00" stroke-width="2.4"></polygon>
