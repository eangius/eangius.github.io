  <text x="250" y="66" font-family="&#39;Open Sans&#39;,system-ui,sans-serif" font-size="9" font-weight="700" letter-spacing="0.12em" fill="#64748b" text-anchor="middle">MARKET</text>

  
  <line x1="200" y1="78" x2="200" y2="196" stroke="#6d9eeb" stroke-width="1.5" opacity="0.5" stroke-dasharray="2 3"></line>
  <text x="200" y="50" font-family="&#39;Open Sans&#39;,system-ui,sans-serif" font-size="13" font-weight="400" fill="#6d9eeb" text-anchor="middle">vs</text>

  
  <g>
    <rect x="125" y="84" width="69" height="17" rx="3.5" fill="#fe6e00" fill-opacity="0.55" stroke="#fe6e00" stroke-width="1.3"></rect>
    <rect x="133" y="107" width="61" height="17" rx="3.5" fill="#fe6e00" fill-opacity="0.55" stroke="#fe6e00" stroke-width="1.3"></rect>
