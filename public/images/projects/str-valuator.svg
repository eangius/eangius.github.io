  <g stroke-linejoin="round" stroke-linecap="round">
    
    <polygon points="229,33 237,23 245,33" fill="#64748b" fill-opacity="0.1" stroke="#64748b" stroke-opacity="0.5" stroke-width="2"></polygon>
