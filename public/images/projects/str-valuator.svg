    <polygon points="237,38 251,26 265,38" fill="#64748b" fill-opacity="0.92" stroke="#475569" stroke-width="1.4"></polygon>
    <rect x="240" y="37" width="22" height="16.5" rx="1.5" fill="#64748b" fill-opacity="0.92" stroke="#475569" stroke-width="1.4"></rect>
    <rect x="247" y="43" width="7" height="7" rx="0.6" fill="#eef2f7"></rect>
